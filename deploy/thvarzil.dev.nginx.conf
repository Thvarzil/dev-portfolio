# /etc/nginx/sites-available/thvarzil.dev

server {
    listen 80;
    server_name thvarzil.dev www.thvarzil.dev thvarzil.com www.thvarzil.com;

    # Let certbot handle ACME challenges, redirect everything else to HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://thvarzil.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.thvarzil.dev thvarzil.com www.thvarzil.com;

    ssl_certificate     /etc/letsencrypt/live/thvarzil.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thvarzil.dev/privkey.pem;

    # Redirect all aliases to canonical domain
    return 301 https://thvarzil.dev$request_uri;
}

server {
    listen 443 ssl;
    server_name thvarzil.dev;

    ssl_certificate     /etc/letsencrypt/live/thvarzil.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thvarzil.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve Django media uploads directly
    location /media/ {
        alias /srv/portfolio/backend/media/;
    }

    # Proxy everything else to gunicorn
    location / {
        proxy_pass         http://unix:/run/gunicorn/portfolio.sock;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }
}
