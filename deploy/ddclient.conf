# /etc/ddclient.conf
# ddclient dynamic DNS config for Hover via DDNS protocol.
#
# Install: sudo apt install ddclient
# Hover DDNS setup: https://help.hover.com/hc/en-us/articles/217282457
# You must enable DDNS on your domain in the Hover control panel first
# and set an initial A record for thvarzil.dev and thvarzil.com.

daemon=300                          # check every 5 minutes
syslog=yes
pid=/var/run/ddclient.pid
ssl=yes

protocol=dyndns2
use=web, web=checkip.amazonaws.com
server=dyndns.hover.com
login=your-hover-username
password=your-hover-password

# List every hostname you want kept up to date
thvarzil.dev
www.thvarzil.dev
thvarzil.com
www.thvarzil.com
